# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - 4ksde5bcv7htk-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: 4ksde5bcv7htkcosureg.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_A72F0193D18A49B48FFCA3856552664B }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_3AF8BBE8A3194211B42B4DF700734FF8 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: 4ksde5bcv7htkcosureg.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_A72F0193D18A49B48FFCA3856552664B }}/4ksde5bcv7htk/techworkshopl300/zava:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_984E7562FFCF459E99F273685B094AC3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_77096FF9EF9845FDB0524D1893BCC501 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F71AB36881DB48BA94F56C052C47B4B2 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: '4ksde5bcv7htk-app'
          slot-name: 'Production'
          images: '4ksde5bcv7htkcosureg.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_A72F0193D18A49B48FFCA3856552664B }}/4ksde5bcv7htk/techworkshopl300/zava:${{ github.sha }}'
          